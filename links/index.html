<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JR Atacadista — Links</title>
  <link rel="icon" href="../public/icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { gold: '#f5a800' },
          fontFamily: { inter: ['Inter', 'sans-serif'] }
        }
      }
    }
  </script>
  <style>
    * { scroll-behavior: smooth; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; }
    ::selection { background: #f5a800; color: #0a0a0a; }
    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #0a0a0a; }
    ::-webkit-scrollbar-thumb { background: #f5a800; border-radius: 10px; }

    .link-card {
      position: relative;
      overflow: hidden;
      display: flex;
      align-items: center;
      gap: 16px;
      background: #111;
      border-radius: 18px;
      padding: 16px 18px;
      border: 1px solid rgba(255,255,255,.06);
      border-left: 2px solid #f5a800;
      text-decoration: none;
      transition: border-color .25s, transform .2s, background .25s;
      -webkit-tap-highlight-color: transparent;
    }
    .link-card:active { transform: scale(0.98); background: #161616; }
    @media (hover: hover) {
      .link-card:hover { border-color: rgba(245,168,0,.35); background: #141414; }
    }

    .link-card .watermark {
      position: absolute;
      right: -10px; bottom: -10px;
      width: 80px; height: 80px;
      object-fit: contain;
      opacity: .05;
      pointer-events: none;
    }

    .link-icon {
      width: 48px; height: 48px;
      flex-shrink: 0;
      border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      background: rgba(245,168,0,.1);
      border: 1px solid rgba(245,168,0,.2);
    }

    .link-chevron {
      flex-shrink: 0;
      color: rgba(255,255,255,.2);
    }

    .dot-bg {
      background-image: radial-gradient(circle, #f5a800 1px, transparent 1px);
      background-size: 28px 28px;
    }
  </style>
</head>
<body class="min-h-screen flex flex-col">

  <main class="flex-grow">
    <section class="px-4 pt-12 pb-16 relative overflow-hidden">
      <div class="dot-bg absolute inset-0 opacity-[0.03] pointer-events-none"></div>

      <!-- container centralizado — max-w para linktree-style -->
      <div class="max-w-md mx-auto relative z-10">

        <!-- perfil -->
        <div class="text-center mb-10">
          <img src="https://jratacadista44.com.br/wp-content/uploads/2024/03/logo02-300x300.jpg"
               alt="JR Atacadista"
               class="w-20 h-20 rounded-full object-cover mx-auto mb-3"
               style="border:2px solid rgba(245,168,0,.5);">
          <p class="text-white font-black text-lg tracking-tight">JR Atacadista</p>
          <p class="text-gold text-xs font-semibold uppercase tracking-[0.3em] mt-1">@jratacadista44</p>
        </div>

        <!-- LISTA DE LINKS -->
        <div class="flex flex-col gap-3">

          <!-- Seja um Revendedor -->
          <a href="https://lp.jratacadista44.com.br/revenda/" target="_blank" rel="noopener" class="link-card">
            <img class="watermark" src="https://jratacadista44.com.br/wp-content/uploads/2024/03/logo02-300x300.jpg" alt="">
            <div class="link-icon">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#f5a800" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"/>
                <line x1="3" y1="6" x2="21" y2="6"/>
                <path d="M16 10a4 4 0 0 1-8 0"/>
              </svg>
            </div>
            <div class="flex-1 text-left">
              <h3 class="font-black text-sm sm:text-base uppercase tracking-tight text-white leading-tight">Seja um Revendedor</h3>
              <p class="text-white/40 text-xs mt-0.5 leading-relaxed">Revenda com lucro mesmo dando desconto.</p>
            </div>
            <svg class="link-chevron w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </a>

            <div class="link-icon">

              </svg>
            </div>
            <div class="flex-1 text-left">
              <h3 class="font-black text-sm sm:text-base uppercase tracking-tight text-white leading-tight">Grupo WhatsApp</h3>
              <p class="text-white/40 text-xs mt-0.5 leading-relaxed">Entre para a comunidade JR.</p>
            </div>
            <svg class="link-chevron w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </a>

          <!-- Catálogo -->

            <img class="watermark" src="https://jratacadista44.com.br/wp-content/uploads/2024/03/logo02-300x300.jpg" alt="">
            <div class="link-icon">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#f5a800" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">

            </div>
            <div class="flex-1 text-left">
              <h3 class="font-black text-sm sm:text-base uppercase tracking-tight text-white leading-tight">Catálogo</h3>
              <p class="text-white/40 text-xs mt-0.5 leading-relaxed">Veja todos os produtos disponíveis.</p>
            </div>
            <svg class="link-chevron w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>

          </a>

          <!-- Instagram -->
          <a href="https://www.instagram.com/jratacadista44/" target="_blank" rel="noopener" class="link-card">
            <img class="watermark" src="https://jratacadista44.com.br/wp-content/uploads/2024/03/logo02-300x300.jpg" alt="">
            <div class="link-icon">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#f5a800" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="2" width="20" height="20" rx="5" ry="5"/>
                <path d="M16 11.37A4 4 0 1 1 12.63 8 4 4 0 0 1 16 11.37z"/>
                <line x1="17.5" y1="6.5" x2="17.51" y2="6.5"/>
              </svg>
            </div>
            <div class="flex-1 text-left">
              <h3 class="font-black text-sm sm:text-base uppercase tracking-tight text-white leading-tight">Instagram</h3>
              <p class="text-white/40 text-xs mt-0.5 leading-relaxed">@jratacadista44</p>
            </div>
            <svg class="link-chevron w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </a>

          <!-- Onde estamos -->
          <a href="https://maps.app.goo.gl/oQqumesyUrhT4QN49" target="_blank" rel="noopener" class="link-card">
            <img class="watermark" src="https://jratacadista44.com.br/wp-content/uploads/2024/03/logo02-300x300.jpg" alt="">
            <div class="link-icon">
              <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="#f5a800" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
                <circle cx="12" cy="10" r="3"/>

            </div>
            <div class="flex-1 text-left">
              <h3 class="font-black text-sm sm:text-base uppercase tracking-tight text-white leading-tight">Onde estamos</h3>
              <p class="text-white/40 text-xs mt-0.5 leading-relaxed">Ver no Google Maps.</p>
            </div>
            <svg class="link-chevron w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <polyline points="9 18 15 12 9 6"/>
            </svg>
          </a>

        </div>
      </div>
    </section>
  </main>

  <footer class="py-6 px-4 text-center" style="border-top:1px solid rgba(255,255,255,.05);">
    <p class="text-white/20 text-xs">© 2026 JR Atacadista. Todos os direitos reservados.</p>
  </footer>

</body>
</html>
