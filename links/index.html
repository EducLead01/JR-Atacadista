<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JR Atacadista</title>
  <link rel="icon" href="../public/icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', sans-serif;
      background: #0d0d0d;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 52px 20px 52px;
    }

    ::selection { background: #f5a800; color: #0d0d0d; }

    .wrap {
      width: 100%;
      max-width: 400px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* ── PERFIL ── */
    .avatar {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 2px solid #f5a800;
      margin-bottom: 14px;
    }

    .name {
      font-size: 20px;
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: -0.3px;
      margin-bottom: 4px;
    }
    .name span { color: #f5a800; }

    .bio {
      font-size: 12px;
      color: rgba(255,255,255,.38);
      letter-spacing: 2.5px;
      text-transform: uppercase;
      margin-bottom: 40px;
    }

    /* ── CARDS ── */
    .links {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .link-item {
      display: flex;
      align-items: center;
      gap: 14px;
      width: 100%;
      padding: 16px 18px;
      background: #161616;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 14px;
      text-decoration: none;
      color: #fff;
      transition: background .18s, border-color .18s, transform .15s;
      position: relative;
      overflow: hidden;
    }

    .link-item::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 3px;
      border-radius: 0 2px 2px 0;
      background: #f5a800;
      opacity: 0;
      transition: opacity .18s;
    }

    .link-item:hover {
      background: #1c1c1c;
      border-color: rgba(245,168,0,.25);
      transform: translateX(3px);
    }
    .link-item:hover::before { opacity: 1; }
    .link-item:active { transform: translateX(1px) scale(.99); }

    .link-icon {
      width: 40px;
      height: 40px;
      border-radius: 10px;
      background: rgba(245,168,0,.1);
      border: 1px solid rgba(245,168,0,.18);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .link-icon svg { width: 18px; height: 18px; }

    /* variações de cor por tipo */
    .link-item.wpp  .link-icon { background: rgba(37,211,102,.1); border-color: rgba(37,211,102,.2); }
    .link-item.ig   .link-icon { background: rgba(225,48,108,.1); border-color: rgba(225,48,108,.2); }
    .link-item.maps .link-icon { background: rgba(66,133,244,.1); border-color: rgba(66,133,244,.2); }

    .link-item.wpp:hover  { border-color: rgba(37,211,102,.3); }
    .link-item.wpp::before  { background: #25d366; }
    .link-item.ig:hover   { border-color: rgba(225,48,108,.3); }
    .link-item.ig::before   { background: #e1306c; }
    .link-item.maps:hover { border-color: rgba(66,133,244,.3); }
    .link-item.maps::before { background: #4285f4; }

    .link-text { flex: 1; min-width: 0; }
    .link-title {
      font-size: 14px;
      font-weight: 700;
      color: #fff;
      line-height: 1.2;
    }
    .link-sub {
      font-size: 11px;
      color: rgba(255,255,255,.35);
      margin-top: 2px;
    }

    .link-arrow {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: rgba(255,255,255,.2);
      transition: color .18s;
    }
    .link-item:hover .link-arrow { color: rgba(255,255,255,.5); }

    .footer {
      font-size: 10px;
      color: rgba(255,255,255,.12);
      letter-spacing: 2px;
      text-transform: uppercase;
      margin-top: 36px;
    }
  </style>
</head>
<body>
<div class="wrap">

  <!-- PERFIL -->
  <img class="avatar"

    <a class="link-item ig" href="https://www.instagram.com/jratacadista_reserva/" target="_blank" rel="noopener">

  </div>

</div>
</body>
