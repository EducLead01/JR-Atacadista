  <link rel="icon" href="../public/icons/favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config = { theme: { extend: { colors: { gold: '#f5a800' } } } }</script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; background: #0a0a0a; color: #fff; min-height: 100vh; }
    ::selection { background: #f5a800; color: #0a0a0a; }

    .dot-bg {
      background-image: radial-gradient(circle, #f5a800 1px, transparent 1px);
      background-size: 28px 28px;
    }

    .link-card {
      display: flex; align-items: center; gap: 12px;
      background: #111;
      border: 1px solid rgba(245,168,0,.25);
      border-radius: 14px;
      padding: 14px 14px;
      text-decoration: none;
      color: #fff;
      transition: border-color .2s, background .2s;
      width: 100%;
    }
    .link-card:hover { border-color: rgba(245,168,0,.55); background: #161616; }

    .link-icon-box {
      width: 40px; height: 40px; border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      background: rgba(245,168,0,.1);
      border: 1px solid rgba(245,168,0,.2);
    }

    .share-btn {
      width: 48px; height: 48px; flex-shrink: 0;
      background: rgba(245,168,0,.08);
      border: 1px solid rgba(245,168,0,.2);
      border-radius: 10px;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center; gap: 3px;
      cursor: pointer; transition: background .2s, border-color .2s;
      color: #f5a800;
    }
    .share-btn:hover { background: rgba(245,168,0,.18); border-color: rgba(245,168,0,.5); }
    .share-btn svg { width: 16px; height: 16px; }
    .share-btn span { font-size: 8px; font-weight: 900; letter-spacing: 1px; text-transform: uppercase; }

    .share-btn.done { background: rgba(37,211,102,.12); border-color: rgba(37,211,102,.3); color: #25d366; }
  </style>
</head>

  <script>
    async function compartilhar(btn, title, url) {
      if (navigator.share) {
        try {
          await navigator.share({ title, url });
        } catch (e) { /* usuário cancelou */ }
      } else {
        await navigator.clipboard.writeText(url);
        btn.classList.add('done');
        const span = btn.querySelector('span');
        const prev = span.textContent;
        span.textContent = 'Copiado!';
        setTimeout(() => { btn.classList.remove('done'); span.textContent = prev; }, 2000);
      }
    }
  </script>
