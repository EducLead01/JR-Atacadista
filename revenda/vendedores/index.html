  <link href="https://fonts.googleapis.com/css2?family=Roboto+Condensed:wght@400;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Open Sans', sans-serif;
      background: #111;
      color: #fff;
      min-height: 100vh;
    }

    header {
      background: #0d0d0d;
      padding: 18px 20px;
      text-align: center;
      border-bottom: 2px solid #f5a800;
    }

    .logo {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      object-fit: cover;
    }

    .logo-text {
      display: block;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      letter-spacing: 1px;
      color: #fff;
      margin-top: 6px;
    }
    .logo-text span { color: #f5a800; }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 32px 20px 48px;
    }

    .title {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 22px;
      font-weight: 700;
      text-align: center;
      color: #f5a800;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    .subtitle {
      text-align: center;
      font-size: 14px;
      color: #aaa;
      margin-bottom: 28px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
    }

    @media (min-width: 480px) {
      .grid { grid-template-columns: repeat(3, 1fr); }
    }

    .card {
      background: #1a1a1a;
      border-radius: 12px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      transition: border-color .2s, transform .2s;
      text-decoration: none;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .card:hover {
      border-color: #f5a800;
      transform: translateY(-3px);
    }

    .card img {
      width: 100%;
      aspect-ratio: 1 / 1;
      object-fit: cover;
      object-position: top;
    }

    .card-body {
      padding: 12px 10px;
      text-align: center;
      width: 100%;
    }

    .card-name {
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 10px;
      line-height: 1.2;
    }

    .card-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      background: #25d366;
      color: #fff;
      font-family: 'Roboto Condensed', sans-serif;
      font-size: 13px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .5px;
      padding: 8px 10px;
      border-radius: 6px;
      text-decoration: none;
      width: 100%;
    }

    .card-btn svg {
      width: 16px;
      height: 16px;
      fill: #fff;
      flex-shrink: 0;
    }
  </style>
